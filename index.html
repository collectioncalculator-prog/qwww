<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Article Writer</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-[#F5F5F4] text-[#1A1A1A] font-sans selection:bg-orange-100 min-h-screen">
  <div class="max-w-3xl mx-auto px-6 py-12 md:py-24">
    <header class="mb-16">
      <h1 class="text-xs uppercase tracking-[0.2em] font-medium text-gray-400 mb-2">Editorial AI</h1>
      <p class="text-3xl md:text-5xl font-semibold tracking-tight leading-tight">Generate professional articles in seconds.</p>
    </header>

    <main>
      <div class="relative group mb-12">
        <input 
          type="text" 
          id="keywordInput" 
          placeholder="Enter a keyword or topic..." 
          class="w-full bg-white border-2 border-transparent focus:border-black outline-none rounded-2xl px-6 py-5 text-lg transition-all shadow-[0_2px_10px_rgba(0,0,0,0.03)] pr-32"
        >
        <button 
          id="generateBtn"
          class="absolute right-3 top-3 bottom-3 px-6 bg-black text-white rounded-xl font-medium text-sm hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:pointer-events-none"
        >
          Generate
        </button>
      </div>

      <div id="loadingState" class="hidden space-y-6">
        <div class="h-8 bg-gray-200 rounded-lg animate-pulse w-3/4"></div>
        <div class="space-y-3">
          <div class="h-4 bg-gray-200 rounded animate-pulse"></div>
          <div class="h-4 bg-gray-200 rounded animate-pulse"></div>
          <div class="h-4 bg-gray-200 rounded animate-pulse w-5/6"></div>
        </div>
      </div>

      <div id="articleOutput" class="prose prose-neutral max-w-none prose-h1:text-4xl prose-h1:font-bold prose-h1:mb-8 prose-p:text-lg prose-p:leading-relaxed prose-p:text-gray-700">
        <!-- AI content will appear here -->
      </div>
    </main>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
